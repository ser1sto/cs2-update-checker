global:
  scrape_interval: 1m
  evaluation_interval: 1m

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "cs2-update-bot-scraper"
    static_configs:
      - targets: ["cs2updatebot:8000"]

  - job_name: 'raspberry_pi'
    static_configs:
      - targets: ['node-exporter:9100']